<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoMEDIA | Bibliothèque de Réalisations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandPrimary: '#e26137',
                        brandSecondary: '#0f3066',
                        brandDark: '#0a0a0c',
                        brandLight: '#f4f0eb'
                    },
                    fontFamily: {
                        editorial: ['Playfair Display', 'serif'],
                        sans: ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:ital,wght=0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        body {
            background-color: #0a0a0c;
            color: #f4f0eb;
            overflow-x: hidden;
        }
        /* Masque la scrollbar de la bibliothèque */
        .shelf-scroll::-webkit-scrollbar {
            display: none;
        }
        .shelf-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Animation de défilement infini du carrousel */
        @keyframes marquee {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }
        .carousel-track {
            display: flex;
            width: max-content;
            animation: marquee 10s linear infinite;
        }
        .carousel-track:hover {
            animation-play-state: paused;
        }
    </style>
</head>
<body class="font-sans min-h-screen bg-brandDark flex flex-col justify-between">

    <main class="pt-16 pb-12 px-4 flex-grow flex flex-col justify-center max-w-7xl mx-auto w-full">
        
        <div class="text-center mb-10">
            <span class="text-brandPrimary uppercase tracking-widest 
                font-extrabold text-xs block mb-2">NOS ARCHIVES</span>
            <h1 class="text-3xl md:text-5xl font-editorial text-white">L'Étagère Visuelle</h1>
            <p class="text-gray-400 max-w-md 
                mx-auto mt-2 text-xs md:text-sm">Cliquez pour ouvrir la collection associée.</p>
        </div>

        <div class="relative w-full border-b-4 border-brandLight/40 pb-1 mb-16">
            <div id="library-shelf" class="shelf-scroll flex items-end 
                justify-start md:justify-center overflow-x-auto space-x-1 
                md:space-x-2 px-4 h-[350px] md:h-[420px] relative z-10 bottom-[-4px]">
                </div>
            <div class="absolute bottom-[-16px] left-0 w-full h-4 
                bg-gradient-to-b from-black/60 to-transparent"></div>
        </div>

        <div id="carousel-modal" class="fixed inset-0 z-50 
            bg-brandDark/95 hidden opacity-0 flex-col justify-center 
            items-center p-4 backdrop-blur-md">
            
            <button onclick="closeCarousel()" 
                class="absolute top-6 right-6 text-white bg-white/10 hover:bg-brandPrimary 
                px-5 py-2.5 rounded-full text-xs uppercase tracking-wider font-bold transition-all z-50">
                <i class="fas fa-times mr-2"></i> Fermer
            </button>

            <div class="text-center mb-8 max-w-xl">
                <h2 id="modal-title" class="text-2xl md:text-4xl 
                    font-editorial text-brandLight italic">Collection</h2>
                <p class="text-gray-400 text-xs mt-1">Laissez défiler... Positionnez votre curseur sur les images pour mettre en pause.</p>
            </div>

            <div class="w-full overflow-hidden relative py-4">
                <div id="carousel-track" class="carousel-track space-x-6">
                    </div>
            </div>
        </div>

    </main>

    <footer class="bg-brandDark border-t border-white/5 py-8 text-center">
        <div class="max-w-7xl mx-auto px-6 flex flex-col items-center justify-center gap-4">
            <a href="index.html" class="inline-flex items-center justify-center px-6 py-3 border border-white/20 rounded-full text-sm font-semibold tracking-wide text-white hover:text-brandPrimary hover:border-brandPrimary transition-all duration-300 transform hover:scale-105 shadow-lg bg-white/5">
                <i class="fas fa-arrow-left mr-3 text-xs"></i> Retour à la page principale
            </a>
            <p class="text-gray-500 text-[10px] mt-2">2026 &copy; RoMEDIA. Tous droits réservés.</p>
        </div>
    </footer>

    <script>
        // =========================================================================
        // AJOUTEZ TOUTES VOS PHOTOS ET LEURS TITRES ICI
        // Regroupez-les par paquets (Ex: par 5). Le titre de la 1ère photo du paquet
        // sera utilisé comme titre global pour le livre et son carrousel.
        // =========================================================================
        const TOUTES_LES_PHOTOS = [
            // --- LIVRE 1 (Exemple : Événement) ---
            { url: "images/RNP_8961-1.jpg", titre: "Célébration d'ouverture Chill&Feel" },
            { url: "images/58668_03.jpg", titre: "Photo 2 du premier projet" },
            { url: "images/RNP_7120-1.jpg", titre: "Photo 3 du premier projet" },
            { url: "images/Props1.png", titre: "Photo 4" },
            { url: "images/58894455-265.png", titre: "Photo 5" },

            // --- LIVRE 2 (Exemple : Branding) ---
            { url: "images/Props1.png", titre: "Branding Soins à Domicile" },
            { url: "images/58894455-265.png", titre: "Photo 2 du deuxième projet" },
            { url: "images/restaurant-window-mockup.jpg", titre: "Photo 3 du deuxième projet" },
            { url: "images/RNP_8961-1.jpg", titre: "Photo 4" },
            { url: "images/58668_03.jpg", titre: "Photo 5" },

            // --- LIVRE 3 (Exemple : Web / Liens Unsplash de secours) ---
            { url: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=600", titre: "Architecture Web Minimaliste" },
            { url: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=600", titre: "Photo 2 du projet Web" },
            { url: "https://images.unsplash.com/photo-1507238691740-187a5b1d37b8?q=80&w=600", titre: "Photo 3 du projet Web" },
            { url: "images/restaurant-window-mockup.jpg", titre: "Photo 4" },
            { url: "images/Props1.png", titre: "Photo 5" },

            // --- LIVRE 4 (Exemple : Mockups) ---
            { url: "images/restaurant-window-mockup.jpg", titre: "Identité Visuelle Restaurant" },
            { url: "images/Props1.png", titre: "Photo 2" },
            { url: "images/58894455-265.png", titre: "Photo 3" },
            { url: "images/RNP_7120-1.jpg", titre: "Photo 4" },
            { url: "images/RNP_8961-1.jpg", titre: "Photo 5" }
            
            // Vous pouvez copier/coller ces lignes pour atteindre 20, 30 ou 50 photos !
        ];

        // Configuration : nombre d'images par carrousel / livre
        const IMAGES_PAR_LIVRE = 20; 
        const booksData = [];

        // Découpage automatique des photos et attribution des titres correspondants
        for (let i = 0; i < TOUTES_LES_PHOTOS.length; i += IMAGES_PAR_LIVRE) {
            const paquetPhotos = TOUTES_LES_PHOTOS.slice(i, i + IMAGES_PAR_LIVRE);
            const numeroLivre = booksData.length + 1;
            
            // On extrait uniquement les URLs pour la galerie carrousel
            const collectionUrls = paquetPhotos.map(item => item.url);
            
            booksData.push({
                id: numeroLivre,
                // Prend le titre de la 1ère photo du paquet ou met un nom par défaut si vide
                title: paquetPhotos[0].titre || `Collection Volume ${numeroLivre}`,
                cover: paquetPhotos[0].url, 
                collection: collectionUrls
            });
        }

        const shelf = document.getElementById('library-shelf');

        // Génération visuelle des tranches de livres sur l'étagère
        booksData.forEach((book, index) => {
            const heights = ['h-[85%]', 'h-[92%]', 'h-[88%]', 'h-[95%]', 'h-[90%]'];
            const randomHeight = heights[index % heights.length];

            const bookHTML = `
                <div onclick="openCarousel(${index})" 
                     class="book-item cursor-pointer flex-none w-[16px] sm:w-[24px] md:w-[32px] 
                     ${randomHeight} bg-brandDark border border-white/10 rounded-sm overflow-hidden 
                     transition-all duration-300 origin-bottom hover:w-[70px] sm:hover:w-[120px] 
                     md:hover:w-[160px] opacity-40 hover:opacity-100 hover:border-brandPrimary 
                     hover:shadow-[0_0_25px_rgba(226,97,55,0.6)] relative group">
                    
                    <div class="w-full h-full bg-cover bg-center grayscale group-hover:grayscale-0 
                    transition-all duration-300" style="background-image: url('${book.cover}')"></div>
                    <div class="absolute inset-0 bg-black/50 group-hover:bg-transparent 
                    transition-colors"></div>

                    <div class="absolute inset-0 p-2 flex flex-col justify-end opacity-0 
                    group-hover:opacity-100 transition-opacity duration-300 bg-gradient-to-t 
                    from-brandDark via-brandDark/40 to-transparent">
                        <span class="text-[8px] text-brandPrimary font-bold uppercase 
                        tracking-wider">PORTFOLIO</span>
                        <h4 class="text-[10px] md:text-xs font-bold text-white 
                        truncate">${book.title}</h4>
                    </div>
                </div>
            `;
            shelf.insertAdjacentHTML('beforeend', bookHTML);
        });

        // Ouvrir le carrousel automatique au clic
        function openCarousel(index) {
            const modal = document.getElementById('carousel-modal');
            const track = document.getElementById('carousel-track');
            const title = document.getElementById('modal-title');
            const selectedBook = booksData[index];

            title.textContent = selectedBook.title;
            track.innerHTML = "";

            // Tripler la liste pour assurer un défilement infini visuel continu (Marquee)
            const imagesList = [...selectedBook.collection, ...selectedBook.collection, ...selectedBook.collection];

            imagesList.forEach(imgUrl => {
                const imgHTML = `
                    <div class="w-[260px] md:w-[400px] aspect-[4/3] rounded-2xl overflow-hidden 
                    border border-white/10 flex-none shadow-2xl bg-white/5">
                        <img src="${imgUrl}" alt="Projet" class="w-full h-full object-cover">
                    </div>
                `;
                track.insertAdjacentHTML('beforeend', imgHTML);
            });

            modal.classList.remove('hidden');
            gsap.to(modal, { 
                opacity: 1, 
                duration: 0.4,
                ease: "power2.out"
            });
        }

        // Fermer la visionneuse carrousel
        function closeCarousel() {
            const modal = document.getElementById('carousel-modal');
            gsap.to(modal, { 
                opacity: 0, 
                duration: 0.3, 
                onComplete: () => {
                    modal.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
