<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoMEDIA | Bibliothèque de Réalisations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brandPrimary: '#e26137', brandDark: '#0a0a0c', brandLight: '#f4f0eb' },
                    fontFamily: { editorial: ['Playfair Display', 'serif'], sans: ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { background-color: #0a0a0c; color: #f4f0eb; overflow-x: hidden; }
        .shelf-scroll::-webkit-scrollbar { display: none; }
        .shelf-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes marquee { 0% { transform: translateX(0%); } 100% { transform: translateX(-50%); } }
        /* items-center aligne parfaitement les photos horizontales et verticales sur le même axe */
        .carousel-track { display: flex; width: max-content; items: center; animation: marquee 10s linear infinite; }
        .carousel-track:hover { animation-play-state: paused; }
    </style>
</head>
<body class="font-sans min-h-screen bg-brandDark flex flex-col justify-between">

    <main class="pt-16 pb-12 px-4 flex-grow flex flex-col justify-center max-w-7xl mx-auto w-full">
        
        <div class="text-center mb-10">
            <span class="text-brandPrimary uppercase tracking-widest 
                font-extrabold text-xs block mb-2">NOS ARCHIVES</span>
            <h1 class="text-3xl md:text-5xl font-editorial text-white">L'Étagère Visuelle</h1>
            <p class="text-gray-400 max-w-md mx-auto 
                mt-2 text-xs md:text-sm">Cliquez pour ouvrir la collection associée.</p>
        </div>

        <div class="relative w-full border-b-4 border-brandLight/40 pb-1 mb-16">
            <div id="library-shelf" class="shelf-scroll flex items-end justify-start md:justify-center 
                overflow-x-auto space-x-1 md:space-x-2 px-4 h-[350px] md:h-[420px] relative z-10 bottom-[-4px]">
                </div>
            <div class="absolute bottom-[-16px] left-0 w-full h-4 bg-gradient-to-b from-black/60 to-transparent"></div>
        </div>

        <div id="carousel-modal" class="fixed inset-0 z-50 bg-brandDark/95 hidden opacity-0 flex-col 
            justify-center items-center p-4 backdrop-blur-md">
            <button onclick="closeCarousel()" class="absolute top-6 right-6 text-white bg-white/10 
                hover:bg-brandPrimary px-5 py-2.5 rounded-full text-xs uppercase tracking-wider font-bold transition-all z-50">
                <i class="fas fa-times mr-2"></i> Fermer
            </button>
            <div class="text-center mb-8 max-w-xl">
                <h2 id="modal-title" class="text-2xl md:text-4xl font-editorial text-brandLight italic">Collection</h2>
                <p class="text-gray-400 text-xs mt-1">Les images peuvent arrêter.</p>
            </div>
            <div class="w-full overflow-hidden relative py-4 flex items-center justify-center">
                <div id="carousel-track" class="carousel-track space-x-8">
                    </div>
            </div>
        </div>
    </main>

    <footer class="bg-brandDark border-t border-white/5 py-8 text-center">
        <div class="max-w-7xl mx-auto px-6 flex flex-col items-center justify-center gap-4">
            <a href="index.html" class="inline-flex items-center justify-center px-6 py-3 border border-white/20 rounded-full text-sm font-semibold tracking-wide text-white hover:text-brandPrimary hover:border-brandPrimary transition-all duration-300 transform hover:scale-105 shadow-lg bg-white/5">
                <i class="fas fa-arrow-left mr-3 text-xs"></i> Retour à la page principale
            </a>
            <p class="text-gray-500 text-[10px] mt-2">2026 &copy; RoMEDIA. Tous droits réservés. Changer pour évoluer.</p>
        </div>
    </footer>

    <script>
        const booksData = [
            { titre: "Portrait en Studio", 
             cover: "images/RNP_0598-2.jpg", 
             carrousel: ["images/RNP_8961-1.jpg", "images/RNP_0598-2.jpg", 
                         "images/RNP_7120-1.jpg", "images/RNP_8961-1.jpg", 
                         "images/58668_03.jpg", "images/RNP_7120-1.jpg", 
                         "images/loop-AI.jpg"] },
            { titre: "Portrait Événementiel", 
             cover: "images/RNP_4322-1.jpg", 
             carrousel: ["images/RNP_4690-1.jpg", "images/RNP_8961-1.jpg", 
                         "images/RNP_4322-1.jpg", "images/RNP_8954-1.jpg"] },
            { titre: "Portrait Naturel", 
             cover: "images/58668_03.jpg", 
             carrousel: ["images/IMG_0055-1.jpg", "images/58668_03.jpg", 
                         "images/IMG_7811-1.jpg", "images/RNP_4768-1.jpg", 
                         "images/RNP_7120-1.jpg"] },
            { titre: "Logo en action", 
             cover: "images/restaurant-window-mockup.jpg", 
             carrousel: ["images/IMG_0055-1.jpg", "images/58668_03.jpg", 
                         "images/IMG_7811-1.jpg", "images/restaurant-window-mockup.jpg", 
                         "images/RNP_7120-1.jpg"] }
            }
        ];

        const shelf = document.getElementById('library-shelf');
        booksData.forEach((book, index) => {
            const heights = ['h-[85%]', 'h-[92%]', 'h-[88%]', 'h-[95%]', 'h-[90%]'];
            const randomHeight = heights[index % heights.length];

            const bookHTML = `
                <div onclick="openCarousel(${index})" class="book-item cursor-pointer flex-none w-[16px] sm:w-[24px] md:w-[32px] ${randomHeight} bg-brandDark border border-white/10 rounded-sm overflow-hidden transition-all duration-300 origin-bottom hover:w-[70px] sm:hover:w-[120px] md:hover:w-[160px] opacity-40 hover:opacity-100 hover:border-brandPrimary hover:shadow-[0_0_25px_rgba(226,97,55,0.6)] relative group">
                    <div class="w-full h-full bg-cover bg-center grayscale group-hover:grayscale-0 transition-all duration-300" style="background-image: url('${book.cover}')"></div>
                    <div class="absolute inset-0 bg-black/50 group-hover:bg-transparent transition-colors"></div>
                    <div class="absolute inset-0 p-2 flex flex-col justify-end opacity-0 group-hover:opacity-100 transition-opacity duration-300 bg-gradient-to-t from-brandDark via-brandDark/40 to-transparent">
                        <span class="text-[8px] text-brandPrimary font-bold uppercase tracking-wider">PORTFOLIO</span>
                        <h4 class="text-[10px] md:text-xs font-bold text-white truncate">${book.titre}</h4>
                    </div>
                </div>`;
            shelf.insertAdjacentHTML('beforeend', bookHTML);
        });

        function openCarousel(index) {
            const modal = document.getElementById('carousel-modal');
            const track = document.getElementById('carousel-track');
            const title = document.getElementById('modal-title');
            const book = booksData[index];

            title.textContent = book.titre;
            track.innerHTML = "";

            const imagesList = [...book.carrousel, ...book.carrousel, ...book.carrousel];
            imagesList.forEach(imgUrl => {
                // CHOC TECHNIQUE CI-DESSOUS : max-h-[65vh] pour mobile et max-h-[70vh] pour desktop.
                // object-contain conserve le ratio natif portrait ou landscape sans rogner ni déformer.
                track.insertAdjacentHTML('beforeend', `
                    <div class="flex-none max-h-[65vh] md:max-h-[70vh] flex items-center justify-center rounded-xl overflow-hidden border border-white/10 shadow-2xl bg-white/5">
                        <img src="${imgUrl}" class="max-h-[65vh] md:max-h-[70vh] w-auto object-contain">
                    </div>`);
            });

            modal.classList.remove('hidden');
            gsap.to(modal, { opacity: 1, duration: 0.4 });
        }

        function closeCarousel() {
            const modal = document.getElementById('carousel-modal');
            gsap.to(modal, { opacity: 0, duration: 0.3, onComplete: () => modal.classList.add('hidden') });
        }
    </script>
</body>
</html>
