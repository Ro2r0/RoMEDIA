<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoMEDIA | Bibliothèque de Réalisations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandPrimary: '#e26137',
                        brandSecondary: '#0f3066',
                        brandDark: '#0a0a0c',
                        brandLight: '#f4f0eb'
                    },
                    fontFamily: {
                        editorial: ['Playfair Display', 'serif'],
                        sans: ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        body {
            background-color: #0a0a0c;
            color: #f4f0eb;
            overflow-x: hidden;
        }
        /* Masquer la scrollbar de la bibliothèque */
        .shelf-scroll::-webkit-scrollbar {
            display: none;
        }
        .shelf-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Animation de défilement infini du carrousel */
        @keyframes marquee {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }
        .carousel-track {
            display: flex;
            width: max-content;
            animation: marquee 25s linear infinite;
        }
        .carousel-track:hover {
            animation-play-state: paused;
        }
    </style>
</head>
<body class="font-sans min-h-screen bg-brandDark flex flex-col justify-between">

    <header class="fixed top-0 left-0 w-full z-50 bg-brandDark/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-extrabold tracking-wider text-white hover:text-brandPrimary transition-colors">
                Ro<span class="text-brandPrimary">MEDIA</span>
            </a>
            <nav class="flex items-center space-x-10 font-semibold tracking-wide">
                <a href="index.html" class="hover:text-brandPrimary transition-colors text-sm uppercase">Accueil</a>
                <span class="text-brandPrimary text-sm uppercase border-b-2 border-brandPrimary pb-1 cursor-default">Portfolio</span>
            </nav>
        </div>
    </header>

    <main class="pt-28 pb-12 px-4 flex-grow flex flex-col justify-center max-w-7xl mx-auto w-full">
        
        <div class="text-center mb-10">
            <span class="text-brandPrimary uppercase tracking-widest font-extrabold text-xs block mb-2">PROJETS ARCHIVÉS</span>
            <h1 class="text-3xl md:text-5xl font-editorial text-white">L'Étagère Visuelle</h1>
            <p class="text-gray-400 max-w-md mx-auto mt-2 text-xs md:text-sm">Passez sur un livre pour l'illuminer. Cliquez pour ouvrir la collection associée.</p>
        </div>

        <div class="relative w-full border-b-4 border-brandLight/40 pb-1 mb-16">
            <div id="library-shelf" class="shelf-scroll flex items-end justify-start md:justify-center overflow-x-auto space-x-1 md:space-x-2 px-4 h-[350px] md:h-[420px] relative z-10 bottom-[-4px]">
                </div>
            <div class="absolute bottom-[-16px] left-0 w-full h-4 bg-gradient-to-b from-black/60 to-transparent"></div>
        </div>

        <div id="carousel-modal" class="fixed inset-0 z-50 bg-brandDark/95 hidden opacity-0 flex-col justify-center items-center p-4 backdrop-blur-md">
            
            <button onclick="closeCarousel()" class="absolute top-6 right-6 text-white bg-white/10 hover:bg-brandPrimary px-5 py-2.5 rounded-full text-xs uppercase tracking-wider font-bold transition-all z-50">
                <i class="fas fa-times mr-2"></i> Fermer la collection
            </button>

            <div class="text-center mb-8 max-w-xl">
                <h2 id="modal-title" class="text-2xl md:text-4xl font-editorial text-brandLight italic">Collection</h2>
                <p class="text-gray-400 text-xs mt-1">Laissez défiler... Positionnez votre curseur sur les images pour mettre en pause.</p>
            </div>

            <div class="w-full overflow-hidden relative py-4 mask-edges">
                <div id="carousel-track" class="carousel-track space-x-6">
                    </div>
            </div>
        </div>

    </main>

    <footer class="bg-brandDark border-t border-white/5 py-6 text-gray-500 text-xs text-center">
        <p>2026 &copy; RoMEDIA. Tous droits réservés.</p>
    </footer>

    <script>
        // Données d'exemple simulant ~20 photos/livres de styles différents (Photo, Info, Web)
        const booksData = [
            { id: 1, type: "photo", cover: "images/RNP_8961-1.jpg", title: "Chill & Feel Event", collection: ["images/RNP_8961-1.jpg", "images/58668_03.jpg", "images/RNP_7120-1.jpg"] },
            { id: 2, type: "info", cover: "images/Props1.png", title: "Branding Soins", collection: ["images/Props1.png", "images/58894455-265.png", "images/restaurant-window-mockup.jpg"] },
            { id: 3, type: "photo", cover: "images/58668_03.jpg", title: "Studio Portrait", collection: ["images/58668_03.jpg", "images/RNP_8961-1.jpg", "images/RNP_7120-1.jpg"] },
            { id: 4, type: "web", cover: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=400", title: "Minimalist Web", collection: ["https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=600", "https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=600", "https://images.unsplash.com/photo-1507238691740-187a5b1d37b8?q=80&w=600"] },
            { id: 5, type: "photo", cover: "images/RNP_7120-1.jpg", title: "Product Design", collection: ["images/RNP_7120-1.jpg", "images/RNP_8961-1.jpg", "images/58668_03.jpg"] },
            { id: 6, type: "info", cover: "images/58894455-265.png", title: "Corporate Kit", collection: ["images/58894455-265.png", "images/Props1.png", "images/restaurant-window-mockup.jpg"] },
            { id: 7, type: "web", cover: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=400", title: "Performance Dev", collection: ["https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=600", "https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=600"] },
            { id: 8, type: "info", cover: "images/restaurant-window-mockup.jpg", title: "Mockup Glass", collection: ["images/restaurant-window-mockup.jpg", "images/Props1.png", "images/58894455-265.png"] },
            { id: 9, type: "web", cover: "https://images.unsplash.com/photo-1507238691740-187a5b1d37b8?q=80&w=400", title: "UI/UX Static", collection: ["https://images.unsplash.com/photo-1507238691740-187a5b1d37b8?q=80&w=600", "https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=600"] },
            // Duplication des données pour atteindre facilement la vingtaine de livres demandés
            { id: 10, type: "photo", cover: "images/RNP_8961-1.jpg", title: "Chill Fest II", collection: ["images/RNP_8961-1.jpg", "images/58668_03.jpg"] },
            { id: 11, type: "info", cover: "images/Props1.png", title: "Branding Design", collection: ["images/Props1.png", "images/restaurant-window-mockup.jpg"] },
            { id: 12, type: "photo", cover: "images/58668_03.jpg", title: "Fashion Vol 4", collection: ["images/58668_03.jpg", "images/RNP_7120-1.jpg"] },
            { id: 13, type: "web", cover: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=400", title: "Creative Agency", collection: ["https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=600"] },
            { id: 14, type: "photo", cover: "images/RNP_7120-1.jpg", title: "Audio Tech", collection: ["images/RNP_7120-1.jpg", "images/RNP_8961-1.jpg"] },
            { id: 15, type: "info", cover: "images/58894455-265.png", title: "Email Brand", collection: ["images/58894455-265.png", "images/Props1.png"] },
            { id: 16, type: "web", cover: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=400", title: "Landing Build", collection: ["https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=600"] },
            { id: 17, type: "info", cover: "images/restaurant-window-mockup.jpg", title: "Store Front", collection: ["images/restaurant-window-mockup.jpg"] },
            { id: 18, type: "web", cover: "https://images.unsplash.com/photo-1507238691740-187a5b1d37b8?q=80&w=400", title: "Sleek Screen", collection: ["https://images.unsplash.com/photo-1507238691740-187a5b1d37b8?q=80&w=600"] },
            { id: 19, type: "photo", cover: "images/RNP_8961-1.jpg", title: "Backstage Ro", collection: ["images/RNP_8961-1.jpg"] },
            { id: 20, type: "info", cover: "images/Props1.png", title: "Final Book", collection: ["images/Props1.png"] }
        ];

        const shelf = document.getElementById('library-shelf');

        // 1. Génération des livres sur l'étagère
        booksData.forEach((book, index) => {
            // Hauteur légèrement variable pour chaque livre pour faire plus réaliste
            const heights = ['h-[85%]', 'h-[92%]', 'h-[88%]', 'h-[95%]', 'h-[90%]'];
            const randomHeight = heights[index % heights.length];

            const bookHTML = `
                <div onclick="openCarousel(${index})" 
                     class="book-item cursor-pointer flex-none w-[16px] sm:w-[24px] md:w-[32px] ${randomHeight} bg-brandDark border border-white/10 rounded-sm overflow-hidden transition-all duration-300 origin-bottom hover:w-[70px] sm:hover:w-[120px] md:hover:w-[160px] opacity-40 hover:opacity-100 hover:border-brandPrimary hover:shadow-[0_0_25px_rgba(226,97,55,0.6)] relative group">
                    
                    <div class="w-full h-full bg-cover bg-center grayscale group-hover:grayscale-0 transition-all duration-300" style="background-image: url('${book.cover}')"></div>
                    
                    <div class="absolute inset-0 bg-black/50 group-hover:bg-transparent transition-colors"></div>

                    <div class="absolute inset-0 p-2 flex flex-col justify-end opacity-0 group-hover:opacity-100 transition-opacity duration-300 bg-gradient-to-t from-brandDark via-brandDark/40 to-transparent">
                        <span class="text-[8px] text-brandPrimary font-bold uppercase tracking-wider">${book.type}</span>
                        <h4 class="text-[10px] md:text-xs font-bold text-white truncate">${book.title}</h4>
                    </div>
                </div>
            `;
            shelf.insertAdjacentHTML('beforeend', bookHTML);
        });

        // 2. Ouvrir le carrousel au clic
        function openCarousel(index) {
            const modal = document.getElementById('carousel-modal');
            const track = document.getElementById('carousel-track');
            const title = document.getElementById('modal-title');
            const selectedBook = booksData[index];

            title.textContent = selectedBook.title;
            track.innerHTML = "";

            // Récupérer la liste d'images de la collection (dupliquée pour le défilement infini)
            const imagesList = [...selectedBook.collection, ...selectedBook.collection, ...selectedBook.collection];

            imagesList.forEach(imgUrl => {
                const imgHTML = `
                    <div class="w-[260px] md:w-[400px] aspect-[4/3] rounded-2xl overflow-hidden border border-white/10 flex-none shadow-2xl bg-white/5">
                        <img src="${imgUrl}" alt="Projet" class="w-full h-full object-cover">
                    </div>
                `;
                track.insertAdjacentHTML('beforeend', imgHTML);
            });

            // Afficher le modal avec animation GSAP
            modal.classList.remove('hidden');
            gsap.to(modal, { 
                opacity: 1, 
                duration: 0.4,
                ease: "power2.out"
            });
        }

        // 3. Fermer le carrousel
        function closeCarousel() {
            const modal = document.getElementById('carousel-modal');
            gsap.to(modal, { 
                opacity: 0, 
                duration: 0.3, 
                onComplete: () => {
                    modal.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
